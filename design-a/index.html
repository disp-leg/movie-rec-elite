<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CELLULOID — Editorial Cinema</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a84c;--cream:#f0e6d3;--dark:#0a0a0a;--charcoal:#1a1a1a}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);color:var(--cream);font-family:'Inter',sans-serif}
#intro{position:fixed;inset:0;z-index:1000;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column}
#intro canvas{position:absolute;inset:0}
#intro .title{position:relative;z-index:1;text-align:center;opacity:0}
#intro .title h1{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,8vw,5rem);font-weight:900;letter-spacing:0.05em;color:var(--cream)}
#intro .title .sub{font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-top:0.5rem}
#app{display:none;width:100%;height:100%;position:relative}
#tabs{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;gap:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;background:linear-gradient(180deg,rgba(10,10,10,0.95) 0%,rgba(10,10,10,0.7) 80%,transparent 100%);padding:1rem 0.5rem 1.5rem;backdrop-filter:blur(10px)}
#tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:0.5rem 1.2rem;font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(240,230,211,0.4);border:1px solid rgba(240,230,211,0.1);border-radius:2px;cursor:pointer;white-space:nowrap;transition:all 0.4s ease}
.tab.active{color:var(--gold);border-color:var(--gold);background:rgba(201,168,76,0.08)}
#content{width:100%;height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
#content::-webkit-scrollbar{display:none}
.movie-section{width:100%;height:100vh;scroll-snap-align:start;position:relative;overflow:hidden}
.movie-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(20px) brightness(0.3);transform:scale(1.1)}
.movie-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,10,0.6) 0%,rgba(10,10,10,0.3) 40%,rgba(10,10,10,0.8) 100%)}
.movie-inner{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 1.5rem 2rem}
.three-container{width:280px;height:380px;margin-bottom:1.5rem;cursor:grab}
.three-container:active{cursor:grabbing}
.movie-meta{text-align:center;max-width:360px}
.movie-meta .year-dir{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem}
.movie-meta h2{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:900;line-height:1.1;margin-bottom:0.6rem}
.movie-meta .why{font-size:0.8rem;line-height:1.6;color:rgba(240,230,211,0.7);margin-bottom:0.8rem;font-weight:300}
.movie-meta .rating{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--gold);margin-bottom:0.8rem}
.streaming-pills{display:flex;flex-wrap:wrap;gap:0.4rem;justify-content:center}
.pill{padding:0.3rem 0.7rem;border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:0.55rem;letter-spacing:0.05em;text-decoration:none;color:#fff;transition:transform 0.2s,opacity 0.2s}
.pill:hover{transform:translateY(-1px);opacity:0.85}
.pill-netflix{background:#e50914}.pill-shudder{background:#8b0000}.pill-tubi{background:#fa5c1f}.pill-amazon{background:#00a8e1}.pill-pluto{background:#2e7d32}.pill-dopebox{background:#7b1fa2}
#shuffle-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.95);display:none;flex-direction:column;align-items:center;justify-content:center}
#shuffle-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:150;width:52px;height:52px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(201,168,76,0.3);transition:transform 0.3s}
#shuffle-btn:hover{transform:scale(1.1)}
#shuffle-btn svg{width:22px;height:22px;fill:var(--dark)}
#film-strip-canvas{width:100%;height:300px;cursor:grab;touch-action:none}
#shuffle-close{position:absolute;top:1.5rem;right:1.5rem;background:none;border:1px solid rgba(240,230,211,0.3);color:var(--cream);font-family:'JetBrains Mono',monospace;font-size:0.7rem;padding:0.4rem 1rem;cursor:pointer;letter-spacing:0.1em}
#shuffle-result{text-align:center;margin-top:1.5rem;max-width:340px;opacity:0;transition:opacity 0.5s}
#shuffle-result h3{font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:0.3rem}
#shuffle-result .sr-sub{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--gold);letter-spacing:0.2em;margin-bottom:0.6rem}
#shuffle-result .sr-why{font-size:0.8rem;color:rgba(240,230,211,0.7);line-height:1.5;margin-bottom:0.8rem}
#shuffle-result .streaming-pills{justify-content:center}
#shuffle-hint{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:rgba(240,230,211,0.3);letter-spacing:0.15em;margin-top:1rem}
</style>
</head>
<body>
<div id="intro">
<canvas id="intro-canvas"></canvas>
<div class="title">
<h1>CELLULOID</h1>
<div class="sub">Deep Cut Cinema &bull; Vol. I</div>
</div>
</div>
<div id="app">
<div id="tabs"></div>
<div id="content"></div>
<button id="shuffle-btn"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
<div id="shuffle-overlay">
<button id="shuffle-close">ESC</button>
<canvas id="film-strip-canvas"></canvas>
<div id="shuffle-result"></div>
<div id="shuffle-hint">DRAG THE FILM STRIP &bull; RELEASE TO PICK</div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
const MOVIES = [
  {id:1,title:"Right at Your Door",year:2006,director:"Chris Gorak",tier:"t1_direct_matches",rating:3.1,poster:"https://image.tmdb.org/t/p/w500/sBkCtdpkWRiisQ3vzyNOZ72biCB.jpg",why:"Dirty bomb hits LA; husband seals himself inside while wife is outside. Claustrophobic domestic apocalypse tension.",streaming:{svod:[],avod:["Tubi","Pluto TV"]}},
  {id:2,title:"Hidden",year:2015,director:"Matt & Ross Duffer",tier:"t1_direct_matches",rating:3.1,poster:"https://image.tmdb.org/t/p/w500/mPuaHaczkoJDzlYD9GyXiDjMXig.jpg",why:"Family hiding in a bunker after an outbreak. Pre-Stranger Things Duffer Brothers. Claustrophobic survival with a twist ending.",streaming:{svod:["Netflix","Amazon Prime"],avod:[]}},
  {id:3,title:"Carriers",year:2009,director:"Àlex & David Pastor",tier:"t1_direct_matches",rating:2.8,poster:"https://image.tmdb.org/t/p/w500/jxjnjHtHXgvjdhkwpelE9ZwVMg6.jpg",why:"Four survivors navigate a pandemic wasteland with strict rules. Moral decay under survival pressure.",streaming:{svod:["Amazon Prime"],avod:["Tubi"]}},
  {id:4,title:"It Comes at Night",year:2017,director:"Trey Edward Shults",tier:"t1_direct_matches",rating:3.1,poster:"https://image.tmdb.org/t/p/w500/rNKJpFMlOZn5zkzBPZxEJrQn5Km.jpg",why:"Family boarded up during an unspecified plague. Another family arrives. Trust erodes into paranoia and violence.",streaming:{svod:["Netflix","Amazon Prime"],avod:[]}},
  {id:5,title:"Await Further Instructions",year:2018,director:"Johnny Kevorkian",tier:"t1_direct_matches",rating:2.5,poster:"https://image.tmdb.org/t/p/w500/afvi5tVi5S3Ux9faZaI32SmPRkj.jpg",why:"Family trapped on Christmas Day by a mysterious barricade. TV gives increasingly sinister instructions.",streaming:{svod:["Netflix","Shudder"],avod:[]}},
  {id:6,title:"Coherence",year:2013,director:"James Ward Byrkit",tier:"t2_claustrophobic",rating:3.7,poster:"https://image.tmdb.org/t/p/w500/ezUtb9m5DeLwL2gxi4gktzNCvQv.jpg",why:"Dinner party goes wrong when a comet passes. Reality fractures. Paranoia in a confined space is pure Divide energy.",streaming:{svod:["Amazon Prime"],avod:["Tubi"]}},
  {id:7,title:"Pontypool",year:2008,director:"Bruce McDonald",tier:"t2_claustrophobic",rating:3.3,poster:"https://image.tmdb.org/t/p/w500/uh4n9FSYYaeOWchP8gBPNtg7kD7.jpg",why:"Radio DJ trapped as a virus spreads through language. Almost entirely one location. Cerebral claustrophobia.",streaming:{svod:["Shudder"],avod:["Tubi"]}},
  {id:8,title:"The Platform",year:2019,director:"Galder Gaztelu-Urrutia",tier:"t2_claustrophobic",rating:3.4,poster:"https://image.tmdb.org/t/p/w500/iXvQnzy6JCAx1PiQEKXuTY04ZHl.jpg",why:"Vertical prison where food descends level by level. Resource scarcity and moral collapse as brutal social allegory.",streaming:{svod:["Netflix"],avod:[]}},
  {id:9,title:"Exam",year:2009,director:"Stuart Hazeldine",tier:"t2_claustrophobic",rating:3.3,poster:"https://image.tmdb.org/t/p/w500/i1J2zBCyOQJKsQipqJ0qXERC1Ma.jpg",why:"Eight candidates in a single room for a final interview. One question, 80 minutes, strict rules. Tension distilled.",streaming:{svod:[],avod:["Tubi","Amazon Prime"]}},
  {id:10,title:"The Bar",year:2017,director:"Álex de la Iglesia",tier:"t2_claustrophobic",rating:3.0,poster:"https://image.tmdb.org/t/p/w500/vYyALnKnzHLv4PoU2b447GYT8R9.jpg",why:"Patrons trapped in a Madrid bar after a sniper kills anyone who exits. Paranoia mounts as they turn on each other.",streaming:{svod:["Netflix","Amazon Prime"],avod:[]}},
  {id:11,title:"Circle",year:2015,director:"Aaron Hann & Mario Miscione",tier:"t3_survival",rating:2.9,poster:"https://image.tmdb.org/t/p/w500/hbIL53MdZFJXsgxXaSOVuApWTs8.jpg",why:"50 strangers in a circle. Every 2 minutes, one dies by group vote. Pure survival psychology with no escape.",streaming:{svod:["Netflix"],avod:["Tubi"]}},
  {id:12,title:"Would You Rather",year:2012,director:"David Guy Levy",tier:"t3_survival",rating:2.8,poster:"https://image.tmdb.org/t/p/w500/tos5MpjaOsAFVGjjieQlZsHlbd.jpg",why:"Desperate guests forced into increasingly brutal choices. Confined space, escalating violence, moral compromise.",streaming:{svod:[],avod:["Tubi","Amazon Prime"]}},
  {id:13,title:"Fermat's Room",year:2007,director:"Piedrahita & Sopeña",tier:"t3_survival",rating:3.2,poster:"https://image.tmdb.org/t/p/w500/qQcYvPXxvk6bQDV9Zgd6cnDQmKZ.jpg",why:"Four mathematicians locked in a room that shrinks unless they solve puzzles. Literal claustrophobia as survival.",streaming:{svod:[],avod:["Amazon Prime","Tubi"]}},
  {id:14,title:"Level 16",year:2018,director:"Danishka Esterhazy",tier:"t3_survival",rating:3.0,poster:"https://image.tmdb.org/t/p/w500/glVIjhLmzmgtppLWb3lvnoPljGW.jpg",why:"Girls in a mysterious boarding school discover the horrifying purpose of their captivity. Institutional claustrophobia.",streaming:{svod:["Shudder"],avod:["Tubi"]}},
  {id:15,title:"The Incident",year:2014,director:"Isaac Ezban",tier:"t3_survival",rating:3.1,poster:"https://image.tmdb.org/t/p/w500/idb1ACZCQAsYJCFMfs9vgyBIbP1.jpg",why:"Two groups trapped in infinite loops — one in a stairwell, one on a highway. Existential claustrophobia.",streaming:{svod:[],avod:["Amazon Prime","Tubi"]}},
  {id:16,title:"Pandorum",year:2009,director:"Christian Alvart",tier:"t4_adjacent",rating:3.2,poster:"https://image.tmdb.org/t/p/w500/mNMfa6r3pl0EzFIKEkVcxyr6Rc7.jpg",why:"Crew wakes on a spaceship with no memory. Something hunts them in the dark. The Divide in space.",streaming:{svod:["Amazon Prime"],avod:["Tubi"]}},
  {id:17,title:"The Void",year:2016,director:"Gillespie & Kostanski",tier:"t4_adjacent",rating:3.0,poster:"https://image.tmdb.org/t/p/w500/2WhZAPi3vomEQdzAPIYTvmvWaxI.jpg",why:"People trapped in a hospital surrounded by cultists. Cosmic horror seeps in. Carpenter-esque.",streaming:{svod:["Shudder"],avod:["Tubi"]}},
  {id:18,title:"Breathing Room",year:2008,director:"John Suits & Gabriel Cowan",tier:"t4_adjacent",rating:2.4,poster:"https://image.tmdb.org/t/p/w500/aaz4rgsEjApkUz87OrFT6sNZDks.jpg",why:"Strangers wake in a locked white room wearing explosive collars. Must figure out the rules or die.",streaming:{svod:[],avod:["Tubi"]}},
  {id:19,title:"The Hole",year:2001,director:"Nick Hamm",tier:"t4_adjacent",rating:2.9,poster:"https://image.tmdb.org/t/p/w500/n5aMoI6AZLJzUoNbjMj0P60EYMJ.jpg",why:"Four teens lock themselves in a WWII bunker for a party. Things go wrong. Early Keira Knightley.",streaming:{svod:["Amazon Prime"],avod:[]}},
  {id:20,title:"The Bunker",year:2024,director:"Adrian Langley",tier:"t4_adjacent",rating:2.6,poster:"https://image.tmdb.org/t/p/w500/jOA7chFPVzSyPp2DaRg8hqA1BHr.jpg",why:"Survivors in a bunker after nuclear event. Resources dwindle, tensions rise. The most direct spiritual successor to The Divide.",streaming:{svod:[],avod:["Tubi","Amazon Prime"]}}
];
const TIERS=[
  {key:"t1_direct_matches",label:"Direct Matches"},
  {key:"t2_claustrophobic",label:"Claustrophobic"},
  {key:"t3_survival",label:"Survival Pressure"},
  {key:"t4_adjacent",label:"Adjacent Deep Cuts"}
];

// ── Intro Animation ──
(function introAnim(){
  const c=document.getElementById('intro-canvas');
  const ctx=c.getContext('2d');
  let w,h;
  function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  const particles=Array.from({length:120},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*0.5,vy:-Math.random()*1.5-0.3,s:Math.random()*2+0.5,a:Math.random()*0.6+0.2}));
  let beam=0,frame=0;
  function draw(){
    ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,w,h);
    // projector beam
    beam=Math.min(beam+0.02,1);
    const grd=ctx.createRadialGradient(w/2,h*0.1,0,w/2,h*0.5,h*0.6);
    grd.addColorStop(0,`rgba(201,168,76,${0.12*beam})`);grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.fillRect(0,0,w,h);
    // particles (dust in projector light)
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.y<0){p.y=h;p.x=Math.random()*w}
      if(p.x<0||p.x>w)p.vx*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,Math.PI*2);
      ctx.fillStyle=`rgba(240,230,211,${p.a*beam})`;ctx.fill();
    });
    frame++;
    if(frame<180)requestAnimationFrame(draw);
  }
  draw();
  // Title fade in
  const tl=gsap.timeline();
  tl.to('#intro .title',{opacity:1,duration:1.2,delay:0.5,ease:'power2.out'})
    .to('#intro .title h1',{letterSpacing:'0.12em',duration:1.5,ease:'power2.out'},'-=0.8')
    .to('#intro',{opacity:0,duration:0.8,delay:0.8,ease:'power2.inOut',onComplete:()=>{
      document.getElementById('intro').style.display='none';
      document.getElementById('app').style.display='block';
      initApp();
    }});
})();

// ── Main App ──
let currentTier='t1_direct_matches';
const textureLoader=new THREE.TextureLoader();
const posterTextures={};
const threeInstances=[];

function getStreamUrl(platform,title){
  const t=encodeURIComponent(title);
  const h=title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-$/,'');
  const map={Netflix:`https://www.netflix.com/search?q=${t}`,'Amazon Prime':`https://www.amazon.com/s?k=${t}&i=instant-video`,Shudder:`https://www.shudder.com/search?q=${t}`,Tubi:`https://tubitv.com/search/${t}`,'Pluto TV':`https://pluto.tv/search/details/${t}`,Dopebox:`https://dopebox.to/search/${h}`};
  return map[platform]||'#';
}
function getPillClass(p){
  const m={'Netflix':'pill-netflix','Shudder':'pill-shudder','Tubi':'pill-tubi','Amazon Prime':'pill-amazon','Pluto TV':'pill-pluto','Dopebox':'pill-dopebox'};
  return m[p]||'';
}

function initApp(){
  // Build tabs
  const tabsEl=document.getElementById('tabs');
  TIERS.forEach(t=>{
    const btn=document.createElement('div');
    btn.className='tab'+(t.key===currentTier?' active':'');
    btn.textContent=t.label;
    btn.addEventListener('click',()=>switchTier(t.key));
    tabsEl.appendChild(btn);
  });
  buildContent(currentTier);
}

function switchTier(tierKey){
  if(tierKey===currentTier)return;
  currentTier=tierKey;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',TIERS[i].key===tierKey);
  });
  // Cleanup old Three instances
  threeInstances.forEach(inst=>{
    inst.renderer.dispose();
    inst.renderer.forceContextLoss();
  });
  threeInstances.length=0;
  const content=document.getElementById('content');
  gsap.to(content,{opacity:0,duration:0.25,onComplete:()=>{
    while(content.firstChild)content.removeChild(content.firstChild);
    buildContent(tierKey);
    content.scrollTop=0;
    gsap.to(content,{opacity:1,duration:0.4});
  }});
}

function buildContent(tierKey){
  const content=document.getElementById('content');
  const movies=MOVIES.filter(m=>m.tier===tierKey);
  movies.forEach(movie=>{
    const section=document.createElement('div');
    section.className='movie-section';

    const bg=document.createElement('div');
    bg.className='movie-bg';
    bg.style.backgroundImage=`url(${movie.poster})`;
    section.appendChild(bg);

    const overlay=document.createElement('div');
    overlay.className='movie-overlay';
    section.appendChild(overlay);

    const inner=document.createElement('div');
    inner.className='movie-inner';

    // Three.js container
    const threeC=document.createElement('div');
    threeC.className='three-container';
    inner.appendChild(threeC);

    // Meta
    const meta=document.createElement('div');
    meta.className='movie-meta';

    const yd=document.createElement('div');
    yd.className='year-dir';
    yd.textContent=`${movie.year} — ${movie.director}`;
    meta.appendChild(yd);

    const h2=document.createElement('h2');
    h2.textContent=movie.title;
    meta.appendChild(h2);

    const whyP=document.createElement('p');
    whyP.className='why';
    whyP.textContent=movie.why;
    meta.appendChild(whyP);

    const rat=document.createElement('div');
    rat.className='rating';
    rat.textContent='★'.repeat(Math.round(movie.rating))+'☆'.repeat(5-Math.round(movie.rating))+` ${movie.rating}/5`;
    meta.appendChild(rat);

    const pills=document.createElement('div');
    pills.className='streaming-pills';
    const allPlatforms=[...movie.streaming.svod,...movie.streaming.avod,'Dopebox'];
    allPlatforms.forEach(p=>{
      const a=document.createElement('a');
      a.className=`pill ${getPillClass(p)}`;
      a.href=getStreamUrl(p,movie.title);
      a.target='_blank';
      a.rel='noopener';
      a.textContent=p;
      pills.appendChild(a);
    });
    meta.appendChild(pills);
    inner.appendChild(meta);
    section.appendChild(inner);
    content.appendChild(section);

    // Initialize Three.js for this tile
    initThreeTile(threeC,movie);
  });
}

function initThreeTile(container,movie){
  const w=container.clientWidth||280;
  const h=container.clientHeight||380;
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(45,w/h,0.1,100);
  camera.position.set(0,0,4);
  const renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});
  renderer.setSize(w,h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  // Lighting
  const ambient=new THREE.AmbientLight(0xffffff,0.3);
  scene.add(ambient);
  const key=new THREE.PointLight(0xc9a84c,1.5,20);
  key.position.set(2,3,4);key.castShadow=true;
  scene.add(key);
  const fill=new THREE.PointLight(0x4466aa,0.5,15);
  fill.position.set(-3,1,2);
  scene.add(fill);

  // Poster tile — 3D box
  const geo=new THREE.BoxGeometry(2,2.8,0.12);
  const materials=[];
  const sideMat=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.8,metalness:0.1});
  // Load poster texture
  const tex=textureLoader.load(movie.poster);
  tex.minFilter=THREE.LinearFilter;
  const frontMat=new THREE.MeshStandardMaterial({map:tex,roughness:0.4,metalness:0.05});
  const backMat=new THREE.MeshStandardMaterial({color:0x111111,roughness:0.9});
  materials.push(sideMat,sideMat,sideMat,sideMat,frontMat,backMat);
  const mesh=new THREE.Mesh(geo,materials);
  mesh.castShadow=true;mesh.receiveShadow=true;
  scene.add(mesh);

  // Shadow catcher plane
  const planeGeo=new THREE.PlaneGeometry(8,8);
  const planeMat=new THREE.ShadowMaterial({opacity:0.3});
  const plane=new THREE.Mesh(planeGeo,planeMat);
  plane.position.z=-1;plane.receiveShadow=true;
  scene.add(plane);

  // Physics state
  let targetRotX=0,targetRotY=0;
  let velX=0,velY=0;
  let isDragging=false,lastX=0,lastY=0;
  const spring=0.08,damping=0.88;

  container.addEventListener('pointerdown',e=>{isDragging=true;lastX=e.clientX;lastY=e.clientY;e.preventDefault()});
  window.addEventListener('pointermove',e=>{
    if(!isDragging){
      const rect=container.getBoundingClientRect();
      const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
      targetRotY=(e.clientX-cx)/rect.width*0.4;
      targetRotX=-(e.clientY-cy)/rect.height*0.3;
    }else{
      velY+=(e.clientX-lastX)*0.008;
      velX-=(e.clientY-lastY)*0.008;
      lastX=e.clientX;lastY=e.clientY;
    }
  });
  window.addEventListener('pointerup',()=>{isDragging=false});

  const inst={renderer,running:true};
  threeInstances.push(inst);

  function animate(){
    if(!inst.running)return;
    requestAnimationFrame(animate);
    if(!isDragging){
      velX+=(targetRotX-mesh.rotation.x)*spring;
      velY+=(targetRotY-mesh.rotation.y)*spring;
    }
    velX*=damping;velY*=damping;
    mesh.rotation.x+=velX;
    mesh.rotation.y+=velY;
    // Subtle float
    mesh.position.y=Math.sin(Date.now()*0.001)*0.05;
    renderer.render(scene,camera);
  }
  animate();
}

// ── Film Strip Shuffle ──
const shuffleBtn=document.getElementById('shuffle-btn');
const shuffleOverlay=document.getElementById('shuffle-overlay');
const shuffleClose=document.getElementById('shuffle-close');
const filmCanvas=document.getElementById('film-strip-canvas');
const shuffleResult=document.getElementById('shuffle-result');

let stripOffset=0,stripVelocity=0,stripDragging=false,stripLastX=0;
let selectedMovie=null;
const FRAME_W=120,FRAME_H=160,STRIP_GAP=16,SPROCKET_R=5;
const totalStripW=(FRAME_W+STRIP_GAP)*MOVIES.length;
const posterImages={};

// Preload poster images
MOVIES.forEach(m=>{
  const img=new Image();
  img.crossOrigin='anonymous';
  img.src=m.poster;
  posterImages[m.id]=img;
});

shuffleBtn.addEventListener('click',()=>{
  shuffleOverlay.style.display='flex';
  shuffleResult.style.opacity='0';
  stripOffset=Math.random()*totalStripW;
  stripVelocity=0;
  drawStrip();
});
shuffleClose.addEventListener('click',()=>{shuffleOverlay.style.display='none'});

filmCanvas.addEventListener('pointerdown',e=>{stripDragging=true;stripLastX=e.clientX;e.preventDefault()});
window.addEventListener('pointermove',e=>{
  if(!stripDragging)return;
  const dx=e.clientX-stripLastX;
  stripVelocity=dx*1.8;
  stripOffset-=dx;
  stripLastX=e.clientX;
  e.preventDefault();
});
window.addEventListener('pointerup',()=>{
  if(stripDragging){
    stripDragging=false;
    // Snap after momentum dies
  }
});

function drawStrip(){
  const c=filmCanvas;
  const dpr=Math.min(window.devicePixelRatio,2);
  const rect=c.getBoundingClientRect();
  c.width=rect.width*dpr;c.height=rect.height*dpr;
  const ctx=c.getContext('2d');
  ctx.scale(dpr,dpr);
  const cw=rect.width,ch=rect.height;
  const centerX=cw/2;

  // Physics
  if(!stripDragging){
    stripVelocity*=0.96; // friction
    stripOffset-=stripVelocity;
    // Snap when slow
    if(Math.abs(stripVelocity)<0.5){
      const frameUnit=FRAME_W+STRIP_GAP;
      const nearestFrame=Math.round(stripOffset/frameUnit)*frameUnit;
      stripOffset+=(nearestFrame-stripOffset)*0.1;
      if(Math.abs(nearestFrame-stripOffset)<1){
        stripOffset=nearestFrame;
        // Determine selected
        const idx=((Math.round(stripOffset/frameUnit)%MOVIES.length)+MOVIES.length)%MOVIES.length;
        if(selectedMovie!==MOVIES[idx]){
          selectedMovie=MOVIES[idx];
          showShuffleResult(selectedMovie);
        }
      }
    }
  }

  ctx.clearRect(0,0,cw,ch);

  // Film strip background
  const stripTop=(ch-FRAME_H)/2-20;
  const stripBot=stripTop+FRAME_H+40;
  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(0,stripTop,cw,stripBot-stripTop);

  // Draw frames
  const frameUnit=FRAME_W+STRIP_GAP;
  const startIdx=Math.floor((stripOffset-cw/2)/frameUnit)-1;
  const endIdx=Math.ceil((stripOffset+cw/2)/frameUnit)+1;

  for(let i=startIdx;i<=endIdx;i++){
    const mi=((i%MOVIES.length)+MOVIES.length)%MOVIES.length;
    const movie=MOVIES[mi];
    const x=i*frameUnit-stripOffset+centerX-FRAME_W/2;
    const y=(ch-FRAME_H)/2;

    // Frame border
    ctx.fillStyle='#0a0a0a';
    ctx.fillRect(x-3,y-3,FRAME_W+6,FRAME_H+6);

    // Poster image
    const img=posterImages[movie.id];
    if(img&&img.complete&&img.naturalWidth>0){
      ctx.drawImage(img,x,y,FRAME_W,FRAME_H);
    }else{
      ctx.fillStyle='#2a2a2a';ctx.fillRect(x,y,FRAME_W,FRAME_H);
      ctx.fillStyle='#666';ctx.font='10px Inter';ctx.textAlign='center';
      ctx.fillText(movie.title,x+FRAME_W/2,y+FRAME_H/2);
    }

    // Highlight center frame
    const dist=Math.abs(x+FRAME_W/2-centerX);
    if(dist<FRAME_W*0.6){
      ctx.strokeStyle=`rgba(201,168,76,${1-dist/(FRAME_W*0.6)})`;
      ctx.lineWidth=2;
      ctx.strokeRect(x-1,y-1,FRAME_W+2,FRAME_H+2);
    }
  }

  // Sprocket holes top and bottom
  ctx.fillStyle='#000';
  for(let sx=0;sx<cw;sx+=24){
    ctx.beginPath();ctx.roundRect?ctx.roundRect(sx,stripTop+4,8,12,2):ctx.rect(sx,stripTop+4,8,12);ctx.fill();
    ctx.beginPath();ctx.roundRect?ctx.roundRect(sx,stripBot-16,8,12,2):ctx.rect(sx,stripBot-16,8,12);ctx.fill();
  }

  // Center gate indicator
  ctx.strokeStyle='rgba(201,168,76,0.6)';ctx.lineWidth=1;
  ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(centerX,stripTop-10);ctx.lineTo(centerX,stripBot+10);ctx.stroke();
  ctx.setLineDash([]);

  // Gate arrows
  ctx.fillStyle='var(--gold)';
  ctx.fillStyle='#c9a84c';
  ctx.beginPath();ctx.moveTo(centerX-8,stripTop-12);ctx.lineTo(centerX+8,stripTop-12);ctx.lineTo(centerX,stripTop-2);ctx.fill();
  ctx.beginPath();ctx.moveTo(centerX-8,stripBot+12);ctx.lineTo(centerX+8,stripBot+12);ctx.lineTo(centerX,stripBot+2);ctx.fill();

  requestAnimationFrame(drawStrip);
}

function showShuffleResult(movie){
  const r=shuffleResult;
  while(r.firstChild)r.removeChild(r.firstChild);

  const h3=document.createElement('h3');
  h3.textContent=movie.title;r.appendChild(h3);

  const sub=document.createElement('div');
  sub.className='sr-sub';
  sub.textContent=`${movie.year} — ${movie.director}`;r.appendChild(sub);

  const why=document.createElement('div');
  why.className='sr-why';
  why.textContent=movie.why;r.appendChild(why);

  const pills=document.createElement('div');
  pills.className='streaming-pills';
  const all=[...movie.streaming.svod,...movie.streaming.avod,'Dopebox'];
  all.forEach(p=>{
    const a=document.createElement('a');
    a.className=`pill ${getPillClass(p)}`;
    a.href=getStreamUrl(p,movie.title);
    a.target='_blank';a.rel='noopener';
    a.textContent=p;pills.appendChild(a);
  });
  r.appendChild(pills);
  gsap.to(r,{opacity:1,duration:0.5});
}
